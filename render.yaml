services:
  # Backend Service (Django)
  - type: web
    name: juicejunction-backend
    env: python
    buildCommand: "cd backend && ./build.sh"
    startCommand: "cd backend && gunicorn juicejunction_backend.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: juicejunction-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"

  # Frontend Service (Static Site)
  - type: static
    name: juicejunction-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishDir: "frontend/dist"
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: juicejunction-backend
          property: host

databases:
  - name: juicejunction-db
    plan: free
