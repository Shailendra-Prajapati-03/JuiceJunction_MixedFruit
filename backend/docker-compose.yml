version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=juicejunction
      - POSTGRES_USER=juiceuser
      - POSTGRES_PASSWORD=juicepassword
    ports:
      - "5432:5432"

  backend:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=dev_secret_key
      - DATABASE_URL=postgres://juiceuser:juicepassword@db:5432/juicejunction
    depends_on:
      - db

volumes:
  postgres_data:
